<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Registro Empresa</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">

</head>
<body class="bg-light">
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-sm border-0 p-4">
                <h3 class="text-center text-info mb-4">Registro de Empresa</h3>

                <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

                <form th:action="@{/registro/guardar}" method="post">
                    <input type="hidden" name="tipo" value="EMPRESA">

                   <!--<div class="mb-3">
                        <label class="form-label fw-bold">Nombre de la Empresa</label>
                        <input type="text" name="nombre" class="form-control" placeholder="Nombre comercial" required>
                    </div>-->

                    <div class="mb-3">
                        <label class="form-label fw-bold">Correo Corporativo</label>
                        <input type="email" name="email" class="form-control" placeholder="rrhh@empresa.com" required>
                        <div class="form-text">Campo obligatorio.</div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold">Contraseña</label>
                        <input type="password" name="clave" class="form-control" required>
                        <div class="form-text">Campo obligatorio.</div>
                    </div>

                    <button type="submit" class="btn btn-info w-100 text-white fw-bold">Solicitar Registro</button>
                    <div class="mt-3 text-center">
                        <a th:href="@{/}" class="text-muted small">Cancelar y volver</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
