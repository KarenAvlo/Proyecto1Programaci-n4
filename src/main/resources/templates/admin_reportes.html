<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Administración - Reportes</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 40px; }
        .container { background: white; max-width: 500px; margin: auto; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #1a202c; text-align: center; }
        .section { margin-bottom: 25px; padding: 15px; border: 1px solid #e2e8f0; border-radius: 8px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #4a5568; }
        select { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #cbd5e0; margin-bottom: 15px; }
        .btn { display: block; width: 100%; padding: 12px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; text-align: center; text-decoration: none; margin-bottom: 10px; transition: 0.2s; }
        .btn-puestos { background: #e53e3e; color: white; }
        .btn-puestos:hover { background: #c53030; }
        .btn-oferentes { background: #3182ce; color: white; }
        .btn-oferentes:hover { background: #2b6cb0; }
        hr { border: 0; border-top: 1px solid #edf2f7; margin: 20px 0; }
    </style>
</head>
<body>

<div class="container">
    <h2>Centro de Reportes</h2>

    <div class="section">
        <form th:action="@{/admin/reporte/mensual}" method="get" target="_blank">
            <label>Seleccione el Mes de Publicación:</label>
            <select name="mes" required>
                <option value="1">Enero</option>
                <option value="2">Febrero</option>
                <option value="3">Marzo</option>
                <option value="4">Abril</option>
                <option value="5">Mayo</option>
                <option value="6">Junio</option>
                <option value="7">Julio</option>
                <option value="8">Agosto</option>
                <option value="9">Septiembre</option>
                <option value="10">Octubre</option>
                <option value="11">Noviembre</option>
                <option value="12">Diciembre</option>
            </select>
            <button type="submit" class="btn btn-puestos">1) Reporte PDF: Empresas y Puestos</button>
        </form>
    </div>

    <hr>

    <div class="section">
        <p style="font-size: 0.9em; color: #718096; margin-bottom: 15px;">
            Genera un informe detallado con estadísticas de todos los oferentes registrados.
        </p>

        <a th:href="@{/admin/reportes/exportar/oferentes}"
           target="_blank"
           class="btn btn-oferentes">
            2) Reporte PDF: Oferentes y Estadísticas
        </a>
    </div>

    <div style="text-align: center; margin-top: 20px;">
        <a th:href="@{/admin/dashboard}" style="color: #a0aec0; text-decoration: none; font-size: 0.8em;">&larr; Volver al Panel Principal</a>
    </div>
</div>

</body>
</html>
