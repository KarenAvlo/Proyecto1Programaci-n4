<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Bolsa de Empleo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">
            <i class="bi bi-briefcase-fill me-2"></i>Bolsa de Empleo
        </a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto align-items-center">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/puestos/buscar}">Buscar Puestos</a>
                </li>
                <li class="nav-item ms-lg-3">
                    <a class="nav-link btn btn-outline-info text-info px-3 my-1" th:href="@{/registro/empresa}">Registro Empresa</a>
                </li>
                <li class="nav-item ms-lg-2">
                    <a class="nav-link btn btn-primary text-white px-3 my-1" th:href="@{/registro/oferente}">Registro Oferente</a>
                </li>
                <li class="nav-item ms-lg-4">
                    <a class="nav-link" th:href="@{/login}">Iniciar Sesión</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <div class="p-5 mb-4 bg-white rounded-3 shadow-sm text-center">
        <h1 class="display-5 fw-bold">Encuentra tu próximo desafío</h1>
        <p class="fs-4">La plataforma líder para conectar empresas con el mejor talento.</p>
        <hr class="my-4">
        <div class="d-grid gap-2 d-sm-flex justify-content-sm-center">
            <a th:href="@{/puestos/buscar}" class="btn btn-primary btn-lg px-4">Ver Ofertas</a>

            <a th:href="@{/registro/empresa}" class="btn btn-outline-secondary btn-lg px-4">Soy una Empresa</a>
        </div>
    </div>
</div>

</body>
</html>
