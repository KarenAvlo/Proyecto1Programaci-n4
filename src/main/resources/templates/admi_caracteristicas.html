<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Administrador - Características</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <style>
    /* ============================================================ */
    /* COPIA LITERAL DE LOS ESTILOS DE TU dashboard_admi.html         */
    /* ============================================================ */
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow-x: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
      background-color: #ffffff;
      min-height: 100vh;
      /* Esta es la fuente que definiste en tu dashboard */
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .header-dark {
      background-color: #1a1a1a;
      color: white;
      padding: 10px 60px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #333;
    }

    .logo-container {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: bold;
      font-size: 1.1rem;
    }

    .logo-icon {
      width: 30px;
      height: 30px;
      background-color: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #1a1a1a;
      font-size: 0.8rem;
    }

    .nav-links {
      display: flex;
      gap: 20px;
    }

    .nav-links a {
      color: #b0b0b0;
      text-decoration: none;
      font-size: 14px;
      transition: color 0.3s;
    }

    .nav-links a:hover, .nav-links a.active {
      color: #ffffff;
    }

    .user-actions {
      display: flex;
      align-items: center;
      gap: 15px;
      font-size: 14px;
    }

    .btn-salir {
      border: 1px solid #444;
      padding: 4px 12px;
      border-radius: 4px;
      color: white;
      text-decoration: none;
      transition: background 0.3s;
    }

    .admin-main {
      flex: 1;
      padding: 60px 100px;
      max-width: 1200px;
      margin: 0 auto;
      width: 100%;
      box-sizing: border-box;
    }

    .footer-dark {
      background-color: #1a1a1a;
      color: #888;
      padding: 25px 100px;
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      border-top: 1px solid #333;
      margin-top: auto;
      width: 100%;
      box-sizing: border-box;
    }

    .footer-brand {
      font-weight: bold;
      color: #bbb;
      margin-bottom: 5px;
      display: block;
    }

    /* Estilos para la tabla de Características */
    .admin-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }
    .admin-table th {
      text-align: left;
      border-bottom: 2px solid #eee;
      padding: 12px;
      font-size: 15px;
    }
    .admin-table td {
      padding: 12px;
      border-bottom: 1px solid #f5f5f5;
      font-size: 14px;
    }
    .form-card {
      background: #f8f9fa;
      padding: 25px;
      border-radius: 8px;
      border: 1px solid #eee;
    }
  </style>
</head>
<body>

<header class="header-dark">
  <div style="display: flex; align-items: center; gap: 20px;">
    <div class="logo-container">
      <div class="logo-icon">BE</div>
      BolsaEmpleo
    </div>
    <nav class="nav-links">
      <a th:href="@{/admin/dashboard}">Dashboard</a>
      <a th:href="@{/admin/empresas-pendientes}">Empresas pendientes</a>
      <a th:href="@{/admin/oferentes-pendientes}">Oferentes pendientes</a>
      <a th:href="@{/admin/caracteristicas}" class="active">Características</a>
      <a href="#">Reportes</a>
    </nav>
  </div>
  <div class="user-actions">
    <span th:text="${session.usuario.email}">admin@bolsa.com</span>
    <a href="/logout" class="btn-salir">Salir</a>
  </div>
</header>

<main class="admin-main">
  <h1 style="font-size: 32px; margin: 0 0 10px 0;">Características</h1>
  <p style="color: #666; margin-bottom: 30px;">Gestión de categorías y habilidades.</p>

  <div style="display: flex; gap: 40px;">
    <div style="flex: 2;">
      <table class="admin-table">
        <thead>
        <tr>
          <th>Nombre</th>
          <th>Jerarquía</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="c : ${lista}">
          <td th:text="${c.nombre}">Java</td>
          <td th:text="${c.idPadre != null ? c.idPadre.nombre : 'Raíz'}">Raíz</td>
        </tr>
        </tbody>
      </table>
    </div>

    <div style="flex: 1;">
      <div class="form-card">
        <h3 style="margin-top: 0;">Nuevo Registro</h3>
        <form th:action="@{/admin/caracteristicas/save}" method="post">
          <label style="display:block; font-weight:bold; margin-bottom:5px;">Nombre:</label>
          <input type="text" name="nombre" required style="width:100%; padding:10px; margin-bottom:15px; border:1px solid #ced4da; border-radius:4px;">

          <label style="display:block; font-weight:bold; margin-bottom:5px;">Depende de:</label>
          <select name="padreId" style="width:100%; padding:10px; margin-bottom:20px; border:1px solid #ced4da; border-radius:4px; background: white;">
            <option value="">-- Es Categoría Principal --</option>
            <option th:each="r : ${raices}" th:value="${r.id}" th:text="${r.nombre}"></option>
          </select>

          <button type="submit" style="width:100%; background:#007bff; color:white; border:none; padding:12px; border-radius:4px; font-weight:bold; cursor:pointer;">Guardar</button>
        </form>
      </div>
    </div>
  </div>
</main>

<footer class="footer-dark">
  <div>
    <span class="footer-brand">Bolsa de Empleo</span>
    Total Soft Inc.
  </div>
  <div style="text-align: right; line-height: 1.6;">
    Contacto: info@bolsaempleo.local<br>
    © 2026
  </div>
</footer>

</body>
</html>
