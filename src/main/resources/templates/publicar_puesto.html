<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Empresa - Publicar Puesto</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="admin-body">

<div class="admin-wrapper">
    <nav class="navbar">
        <div>
            <a th:href="@{/}">Bolsa de Empleo</a>
        </div>
        <div>
            <a th:href="@{/empresa/dashboard}" >Dashboard</a>
            <a th:href="@{/empresa/new}">Publicar Puesto</a>
            <a th:href="@{/empresa/show}">Mis Puestos</a>

            <span style="color: white; margin-left: 15px;" th:text="${correoUsuario}">
                empresa@correo.com
            </span>

            <a th:href="@{/logout}"
               style="color: white; border: 1px solid white; padding: 4px 12px; border-radius: 4px; margin-left: 10px; text-decoration: none;">
                Salir
            </a>
        </div>
    </nav>

    <main class="admin-content">
        <div class="form-container form-large">
            <h2>Publicar Nueva Vacante</h2>

            <form th:action="@{/empresa/save}" th:object="${puesto}" method="post">

                <div class="form-group">
                    <label style="font-weight: bold; display: block; margin-bottom: 10px;">Requisitos del Puesto (Habilidades y Niveles):</label>

                    <div th:each="i : ${#numbers.sequence(1, 5)}" style="display: flex; gap: 10px; margin-bottom: 8px;">

                        <select name="caracteristicaIds" class="form-control" style="flex: 2;">
                            <option value="">-- Seleccione una habilidad --</option>
                            <option th:each="c : ${caracteristicasSistema}"
                                    th:value="${c.id}"
                                    th:text="${c.nombre}"></option>
                        </select>

                        <select name="niveles" class="form-control" style="flex: 1;">
                            <option value="1">Nivel 1 (Básico)</option>
                            <option value="2">Nivel 2</option>
                            <option value="3">Nivel 3 (Intermedio)</option>
                            <option value="4">Nivel 4</option>
                            <option value="5">Nivel 5 (Experto)</option>
                        </select>
                    </div>
                    <small style="color: #666;">* Puede llenar desde una hasta cinco habilidades.</small>
                </div>

                <div class="form-row">
                    <div class="form-group flex-1">
                        <label>Moneda:</label>
                        <select th:field="*{moneda}" class="form-control">
                            <option value="CRC">Colones (₡)</option>
                            <option value="USD">Dólares ($)</option>
                        </select>
                    </div>
                    <div class="form-group flex-2">
                        <label>Salario Ofrecido:</label>
                        <input type="number" step="0.01" th:field="*{salarioOfrecido}" class="form-control" placeholder="0.00" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Tipo de Publicación:</label>
                    <select th:field="*{tipoPublicacion}" class="form-control">
                        <option value="PUBLICA">Pública (Abierta a todos)</option>
                        <option value="PRIVADA">Privada (Solo por invitación)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Descripción General del Puesto:</label>
                    <textarea th:field="*{descripcion}" class="form-control" rows="6"
                              style="resize: none; width: 100%;"
                              placeholder="Detalle las responsabilidades y beneficios del puesto..." required></textarea>
                </div>

                <div class="form-actions" style="margin-top: 30px; text-align: right;">
                    <a th:href="@{/empresa/show}" class="btn-link" style="margin-right: 20px; text-decoration: none; color: #666;">Cancelar</a>
                    <button type="submit" class="btn-primary">Publicar Vacante</button>
                </div>
            </form>
        </div>
    </main>

    <footer class="footer-dark">
        <div>
            <strong>Bolsa de Empleo</strong><br>
            Total Soft Inc.
        </div>
        <div style="text-align: right;">
            Contacto: info@bolsaempleo.local<br>
            © 2026
        </div>
    </footer>
</div>

</body>
</html>
