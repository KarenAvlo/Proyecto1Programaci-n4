<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Registro Empresa - Bolsa de Empleo</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="bg-light">

<nav class="navbar">
    <div>
        <a th:href="@{/}">Bolsa de Empleo</a>
    </div>
    <div>
        <a th:href="@{/puestos/buscar}">Buscar Puestos</a>
        <a class="btn btn-outline" th:href="@{/registro/empresa}">Registro Empresa</a>
        <a class="btn btn-outline" th:href="@{/registro/oferente}">Registro Oferente</a>
        <a th:href="@{/login}">Iniciar Sesión</a>
    </div>
</nav>

<div class="form-container form-large">
    <h2>Registro de Empresa</h2>

    <div th:if="${error}" style="color:red; margin-bottom: 15px; text-align: center;">
        <p th:text="${error}"></p>
    </div>

    <form th:action="@{/registro/guardar}" method="post">
        <input type="hidden" name="tipo" value="EMPRESA">

        <div class="form-group">
            <label>Nombre de la Empresa:</label>
            <input type="text" name="nombre" placeholder="Nombre comercial" required>
        </div>

        <div class="form-group">
            <label>Correo Corporativo:</label>
            <input type="email" name="email" placeholder="rrhh@empresa.com" required>
            <small style="color: #666;">Este será su usuario para iniciar sesión.</small>
        </div>

        <div class="form-group">
            <label>Contraseña:</label>
            <input type="password" name="clave" placeholder="Mínimo 6 caracteres" required minlength="6">
        </div>



        <!-- BOTÓN -->
        <button type="submit" class="btn btn-primary">
            Registrarse
        </button>

       <!-- <button type="submit" class="btn-primary" style="margin-top: 10px;">Solicitar Registro</button>-->

        <div style="margin-top: 20px; text-align: center;">
            <a th:href="@{/}" style="color: #666; text-decoration: none; font-size: 14px;">← Volver al inicio</a>
        </div>
    </form>
</div>

<footer style="background-color: #212529; color: white; text-align: center; padding: 20px; margin-top: 50px;">
    <p>&copy; 2024 Bolsa de Empleo - Ingeniería Informática</p>
</footer>

</body>
</html>
