<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Buscar Puestos</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">

</head>
<body class="bg-light">

<nav class="navbar">
    <div>
        <a href="/">Bolsa de Empleo</a>
    </div>

    <div>
        <a th:href="@{/puestos/buscar}">Buscar Puestos</a>

        <!-- antes: btn btn-outline-info -->
        <a class="btn btn-outline" th:href="@{/registro/empresa}">
            Registro Empresa
        </a>

        <!-- antes: btn btn-primary -->
        <a class="btn btn-outline" th:href="@{/registro/oferente}">
            Registro Oferente
        </a>

        <a th:href="@{/login}">Iniciar Sesión</a>
    </div>
</nav>

<div class="main-content">
    <div class="search-box">
        <h2 style="margin-top: 0;">Buscar puestos por características</h2>

        <form th:action="@{/puestos/buscar}" method="post">
            <div style="margin-bottom: 25px; max-width: 300px;">
                <label style="display: block; font-weight: bold; margin-bottom: 8px;">Filtrar por Moneda:</label>
                <select name="moneda" style="width: 100%; padding: 8px; border: 1px solid #dee2e6; border-radius: 4px; background-color: white;">
                    <option value="">Todas las monedas</option>
                    <option value="CRC">Colones (₡)</option>
                    <option value="USD">Dólares ($)</option>
                </select>
            </div>

            <div th:each="cat : ${categorias}">
                <span class="category-title" th:text="${cat.nombre}">Categoría</span>

                <div th:each="sub : ${logicService.listarSubcategorias(cat)}" class="check-item">
                    <input type="checkbox" name="caracteristicas" th:value="${sub.id}" th:id="'c'+${sub.id}"/>
                    <label th:for="'c'+${sub.id}" th:text="${sub.nombre}"></label>
                </div>
            </div>

            <div class="btn-row">
                <button type="submit" class="btn-primary" style="padding: 10px 30px; border: none; cursor: pointer;">Buscar</button>
                <a href="/puestos/buscar" class="btn" style="background: #eee; color: #333; border: 1px solid #ccc;">Limpiar</a>
            </div>
        </form>
    </div>



    <div class="puestos-grid-container" th:if="${resultados != null}" style="padding-bottom: 50px;">
        <h2 style="grid-column: 1 / -1;">Resultados</h2>
        <div class="card-puesto" th:each="p : ${resultados}">
            <div>
                <h3 th:text="${p.emailEmpresa.nombre}">Empresa</h3>
                <p th:text="${p.descripcion}">Puesto</p>
                <div class="salario">
                    <span th:text="${p.moneda ?: '₡'}"></span>
                    <span th:text="${#numbers.formatDecimal(p.salarioOfrecido, 1, 'POINT', 2, 'COMMA')}"></span>
                </div>
            </div>
            <button class="btn-detalle">Ver detalle</button>
        </div>
        <p th:if="${#lists.isEmpty(resultados)}" style="grid-column: 1 / -1;">No se encontraron resultados.</p>
    </div>
</div>

<footer class="footer-dark">
    <div>
        <strong>Bolsa de Empleo</strong><br>
        Total Soft Inc.
    </div>
    <div style="text-align: right; line-height: 1.4;">
        Contacto: info@bolsaempleo.local<br>
        © 2026
    </div>
</footer>

</body>
</html>
