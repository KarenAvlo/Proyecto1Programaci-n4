<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Bolsa de Empleo - Mi currículum</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; padding: 40px; }
        .cv-container { max-width: 600px; margin: auto; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); text-align: center; }
        .upload-area { border: 2px dashed #cbd5e0; padding: 30px; border-radius: 8px; margin: 20px 0; background-color: #fafafa; }
        .btn-upload { background-color: #4A90E2; color: white; padding: 12px 25px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; }
        .btn-upload:hover { background-color: #357ABD; }
        .btn-view { display: inline-block; margin-top: 15px; color: #4A90E2; text-decoration: none; font-weight: 500; border: 1px solid #4A90E2; padding: 8px 20px; border-radius: 6px; }
        .btn-view:hover { background-color: #f0f7ff; }
        .alert { padding: 15px; border-radius: 6px; margin-bottom: 20px; font-size: 14px; }
        .alert-success { background-color: #c6f6d5; color: #22543d; border: 1px solid #9ae6b4; }
        .alert-error { background-color: #fed7d7; color: #822727; border: 1px solid #feb2b2; }
        .status-badge { display: inline-block; padding: 5px 12px; border-radius: 20px; font-size: 12px; margin-bottom: 10px; }
        .status-ok { background: #e6fffa; color: #2c7a7b; }
        .status-none { background: #fff5f5; color: #c53030; }
    </style>
</head>
<body>

<div class="cv-container">

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

    <h2>Gestión de Currículum</h2>
    <p style="color: #718096;">Sube tu perfil profesional en formato PDF para que las empresas puedan conocerte.</p>

    <div style="margin: 25px 0;">
        <div th:if="${oferente.curriculoPath != null}">
            <span class="status-badge status-ok">● CV Registrado</span>
            <p style="font-size: 0.9em; color: #4a5568;">Archivo actual: <span th:text="${oferente.curriculoPath}"></span></p>
            <a th:href="@{'/uploads/' + ${oferente.curriculoPath}}" target="_blank" class="btn-view">Ver mi CV actual</a>
        </div>
        <div th:if="${oferente.curriculoPath == null}">
            <span class="status-badge status-none">○ Sin currículum</span>
            <p style="font-size: 0.9em; color: #a0aec0;">Aún no has subido tu hoja de vida.</p>
        </div>
    </div>

    <form th:action="@{/presentation/oferente/cv/upload}" method="post" enctype="multipart/form-data">
        <div class="upload-area">
            <input type="file" name="archivo" id="archivo" accept="application/pdf" required>
            <p style="font-size: 0.75em; color: #a0aec0; margin-top: 10px;">Tamaño máximo recomendado: 5MB</p>
        </div>

        <button type="submit" class="btn-upload">Actualizar Currículum</button>
    </form>

    <div style="margin-top: 30px;">
        <a th:href="@{/presentation/oferente/dashboard}" style="color: #a0aec0; text-decoration: none; font-size: 0.9em;">&larr; Volver al Dashboard</a>
    </div>
</div>

</body>
</html>
