<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Empresa - Dashboard</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="bg-light">

<div class="admin-wrapper">
    <nav class="navbar">
        <div>
            <a th:href="@{/}">Bolsa de Empleo</a>
        </div>
        <div>
            <a th:href="@{/empresa/dashboard}" >Dashboard</a>
            <a th:href="@{/empresa/new}">Publicar Puesto</a>
            <a th:href="@{/empresa/show}">Mis Puestos</a>

            <span style="color: white; margin-left: 15px;" th:text="${correoUsuario}">
                empresa@correo.com
            </span>

            <a th:href="@{/logout}"
               style="color: white; border: 1px solid white; padding: 4px 12px; border-radius: 4px; margin-left: 10px; text-decoration: none;">
                Salir
            </a>
        </div>
    </nav>

    <main class="admin-content" style="padding: 40px;">
        <div class="dashboard-container">
            <h1 class="title-main">Empresa - Dashboard</h1>
            <p class="subtitle-main">Desde aquí podés administrar tus puestos y buscar candidatos.</p>

            <div class="btn-group">
                <a th:href="@{/empresa/show}" class="btn-custom-blue">Ver mis puestos</a>
                <a th:href="@{/empresa/new}" class="btn-custom-blue">Publicar nuevo puesto</a>
            </div>
        </div>
    </main>

    <footer class="footer-dark">
        <div>
            <strong>Bolsa de Empleo</strong><br>
            Total Soft Inc.
        </div>
        <div style="text-align: right; line-height: 1.4;">
            Contacto: info@bolsaempleo.local<br>
            © 2026
        </div>
    </footer>
</div>

</body>
</html>
